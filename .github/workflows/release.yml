name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  QT_VERSION_DESKTOP: '6.9.2'   # aqtinstall で利用可能な最新安定版
  QT_VERSION_ANDROID: '6.11.1'  # Android は 6.11.1 が利用可能
  APP_NAME:           'iBeaconScanner'

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Windows x64 (MSVC 2022) ─────────────────────────────────────────────
  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Qt (MSVC 2022)
        uses: jurplel/install-qt-action@v4
        with:
          version:  ${{ env.QT_VERSION_DESKTOP }}
          host:     windows
          target:   desktop
          arch:     win64_msvc2022_64
          modules:  qtconnectivity
          cache:    true

      - name: Configure
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt runtime
        run: |
          $deploy = "deploy"
          New-Item $deploy -ItemType Directory | Out-Null
          Copy-Item "build\Release\ibeacon-scanner.exe" $deploy\
          windeployqt6 --release --no-translations --dir $deploy `
            "$deploy\ibeacon-scanner.exe"

      - name: Package
        run: Compress-Archive deploy "${{ env.APP_NAME }}-windows-x64.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-x64
          path: ${{ env.APP_NAME }}-windows-x64.zip

  # ── Linux x86_64 AppImage ───────────────────────────────────────────────
  linux-x64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version:  ${{ env.QT_VERSION_DESKTOP }}
          host:     linux
          target:   desktop
          arch:     linux_gcc_64
          modules:  qtconnectivity
          cache:    true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libglib2.0-dev \
            libbluetooth-dev libdbus-1-dev \
            libfuse2 patchelf

      - name: Configure & build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          cmake --build build --parallel

      - name: Download linuxdeploy
        run: |
          base="https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous"
          bqt="https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous"
          wget -q -O linuxdeploy           "$base/linuxdeploy-x86_64.AppImage"
          wget -q -O linuxdeploy-plugin-qt "$bqt/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy linuxdeploy-plugin-qt

      - name: Create AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake
        run: |
          cat > iBeaconScanner.desktop << 'EOF'
          [Desktop Entry]
          Name=iBeacon Scanner
          Exec=ibeacon-scanner
          Icon=iBeaconScanner
          Type=Application
          Categories=Utility;
          EOF

          cp resources/app_icon.png iBeaconScanner.png

          # Mimer SQL ドライバは CI 環境に依存ライブラリ (libmimerapi.so) がないため除外
          rm -f "$QT_ROOT_DIR/plugins/sqldrivers/libqsqlmimer.so" || true

          ./linuxdeploy \
            --appdir AppDir \
            --executable build/ibeacon-scanner \
            --desktop-file iBeaconScanner.desktop \
            --icon-file    iBeaconScanner.png \
            --plugin qt \
            --output appimage

          mv *.AppImage ${{ env.APP_NAME }}-linux-x64.AppImage

      - uses: actions/upload-artifact@v7
        with:
          name: linux-x64
          path: ${{ env.APP_NAME }}-linux-x64.AppImage

  # ── Android arm64-v8a APK ────────────────────────────────────────────────
  android-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android NDK / build-tools / platform
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses \
            > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018" "build-tools;37.0.0" "platforms;android-35"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install Qt (Android arm64-v8a + host)
        uses: jurplel/install-qt-action@v4
        with:
          version:  ${{ env.QT_VERSION_ANDROID }}
          host:     linux
          target:   android
          arch:     android_arm64_v8a
          modules:  qtconnectivity
          extra:    '--autodesktop'
          cache:    true

      - name: Set Qt host path
        run: echo "QT_HOST_PATH=$(dirname $QT_ROOT_DIR)/gcc_64" >> $GITHUB_ENV

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d ' \n\r' | base64 -d > release.jks

      - name: Configure (Release)
        run: |
          cmake -S . -B build-android \
            -G Ninja \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_NDK="$ANDROID_NDK_ROOT" \
            -DANDROID_PLATFORM=android-28 \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DANDROID_STL=c++_shared \
            -DANDROID_USE_LEGACY_TOOLCHAIN_FILE=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DCMAKE_FIND_ROOT_PATH="$QT_ROOT_DIR" \
            -DQT_HOST_PATH="$QT_HOST_PATH" \
            -DQT_NO_GLOBAL_APK_TARGET_PART_OF_ALL=ON \
            -DQT_USE_TARGET_ANDROID_BUILD_DIR=ON

      - name: Build unsigned APK
        run: cmake --build build-android --target apk --parallel

      - name: Sign APK with apksigner
        run: |
          UNSIGNED=$(find build-android -name "*.apk" -path "*/release/*" | head -1)
          echo "Signing: $UNSIGNED"
          $ANDROID_SDK_ROOT/build-tools/37.0.0/apksigner sign \
            --ks release.jks \
            --ks-key-alias "${{ secrets.ANDROID_KEYSTORE_ALIAS }}" \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASS }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASS }}" \
            --out ${{ env.APP_NAME }}-android-arm64.apk \
            "$UNSIGNED"

      - uses: actions/upload-artifact@v7
        with:
          name: android-arm64
          path: ${{ env.APP_NAME }}-android-arm64.apk

  # ── GitHub Release ───────────────────────────────────────────────────────
  release:
    needs: [windows-x64, linux-x64, android-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.APP_NAME }}-windows-x64.zip
            ${{ env.APP_NAME }}-linux-x64.AppImage
            ${{ env.APP_NAME }}-android-arm64.apk
